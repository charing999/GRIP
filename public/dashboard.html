<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRIP — 보안 대시보드</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <nav class="navbar">
    <a class="nav-brand" href="/">GRIP</a>
    <span class="nav-title">보안 대시보드</span>
    <div class="nav-actions" id="navActions"></div>
  </nav>

  <div class="dashboard-layout">

    <!-- 메인 영역 -->
    <main class="dashboard-main">

      <!-- 이벤트 타입별 막대 차트 -->
      <section class="chart-bar" id="chartSection">
        <h2 class="section-title">이벤트 통계 <small class="section-sub">(최근 10분, 1분 단위)</small></h2>
        <div class="chart-wrapper">
          <canvas id="barChart"></canvas>
        </div>
      </section>

      <!-- 실시간 이벤트 피드 -->
      <section class="event-feed" id="eventFeed">
        <h2 class="section-title">실시간 보안 이벤트</h2>

        <div class="feed-controls">
          <button class="filter-btn active" data-filter="all">전체</button>
          <button class="filter-btn" data-filter="sqli">SQLI</button>
          <button class="filter-btn" data-filter="brute">브루트포스</button>
          <button class="filter-btn" data-filter="qr">QR</button>
          <button class="filter-btn" data-filter="ai">AI</button>
          <button class="filter-btn" data-filter="ok">결제</button>
        </div>

        <ol class="feed-list" id="feedList" reversed></ol>
      </section>

    </main>

    <!-- 사이드바: AI 차단 권고 패널 -->
    <aside class="ai-alerts-panel" id="aiAlertsPanel">
      <h2 class="section-title">AI 차단 권고</h2>

      <div class="ai-controls">
        <button class="btn btn-outline" id="aiAnalyzeBtn" type="button">즉시 분석 실행</button>
      </div>

      <div class="alerts-list" id="alertsList"></div>

      <p class="alerts-empty" id="alertsEmpty">미처리 권고 없음</p>
    </aside>

  </div>

  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
